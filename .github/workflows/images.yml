name: Build and Publish Images

on:
  push:
    branches:
      - main
    paths:
      - 'images/**'
  pull_request:
    paths:
      - 'images/**'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/devcontainer-templates

jobs:
  generate-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4

      - name: Generate build matrix
        id: matrix
        run: |
          matrix='[]'
          for dir in images/*/; do
            image=$(basename "$dir")
            build_config="${dir}build.json"

            if [ -f "$build_config" ]; then
              arg=$(jq -r '.arg' "$build_config")
              latest=$(jq -r '.latest' "$build_config")

              for version in $(jq -r '.versions[]' "$build_config"); do
                is_latest=$( [ "$version" = "$latest" ] && echo "true" || echo "false" )
                matrix=$(echo "$matrix" | jq -c \
                  --arg img "$image" \
                  --arg ver "$version" \
                  --arg arg "$arg" \
                  --arg is_latest "$is_latest" \
                  '. + [{"image": $img, "version": $ver, "build-arg": $arg, "latest": ($is_latest == "true")}]')
              done
            else
              matrix=$(echo "$matrix" | jq -c \
                --arg img "$image" \
                '. + [{"image": $img, "version": "", "build-arg": "", "latest": true}]')
            fi
          done

          echo "matrix={\"include\":$matrix}" >> $GITHUB_OUTPUT

  build:
    needs: generate-matrix
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJSON(needs.generate-matrix.outputs.matrix) }}
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate tags
        id: tags
        run: |
          IMAGE="${{ env.IMAGE_PREFIX }}/${{ matrix.image }}"
          VERSION="${{ matrix.version }}"
          IS_LATEST="${{ matrix.latest }}"
          EVENT="${{ github.event_name }}"

          tags=""
          primary=""

          if [ "$EVENT" = "pull_request" ]; then
            if [ -n "$VERSION" ]; then
              primary="${IMAGE}:${VERSION}-pr${{ github.event.pull_request.number }}"
            else
              primary="${IMAGE}:pr${{ github.event.pull_request.number }}"
            fi
            tags="$primary"
          else
            if [ -n "$VERSION" ]; then
              primary="${IMAGE}:${VERSION}"
              tags="$primary"
              if [ "$IS_LATEST" = "true" ]; then
                tags="${tags},${IMAGE}:latest"
              fi
            else
              primary="${IMAGE}:latest"
              tags="${primary},${IMAGE}:sha-${GITHUB_SHA::7}"
            fi
          fi

          echo "tags=$tags" >> $GITHUB_OUTPUT
          echo "primary-tag=$primary" >> $GITHUB_OUTPUT

      - name: Build and push
        id: push
        uses: docker/build-push-action@v6
        with:
          context: ./images/${{ matrix.image }}
          platforms: ${{ github.event_name == 'pull_request' && 'linux/amd64' || 'linux/amd64,linux/arm64' }}
          push: ${{ github.event_name != 'pull_request' }}
          load: ${{ github.event_name == 'pull_request' }}
          tags: ${{ steps.tags.outputs.tags }}
          build-args: ${{ matrix.build-arg != '' && format('{0}={1}', matrix.build-arg, matrix.version) || '' }}
          provenance: ${{ github.event_name != 'pull_request' }}
          sbom: ${{ github.event_name != 'pull_request' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run image tests
        if: github.event_name == 'pull_request' && hashFiles(format('test/images/{0}/test.sh', matrix.image)) != ''
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/test/images/${{ matrix.image }}:/tests \
            -v ${{ github.workspace }}/test/test-utils:/utils \
            ${{ steps.tags.outputs.primary-tag }} \
            bash /tests/test.sh

      - name: Generate artifact attestation
        if: github.event_name != 'pull_request'
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ${{ env.IMAGE_PREFIX }}/${{ matrix.image }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          image-ref: ${{ steps.tags.outputs.primary-tag }}
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('trivy-results.sarif') != ''
        with:
          sarif_file: 'trivy-results.sarif'
